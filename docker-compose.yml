services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobvault
      POSTGRES_PASSWORD: jobvault
      POSTGRES_DB: jobvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobvault:jobvault@db:5432/jobvault
      SECRET_KEY: change-me-to-a-random-secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/code

volumes:
  pgdata:
