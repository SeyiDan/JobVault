<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobVault — Generate Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; text-align: center; background: #f1f5f9; color: #1e293b; }
    h1 { margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }
    .icons { display: flex; gap: 24px; justify-content: center; align-items: flex-end; flex-wrap: wrap; }
    .icon-box { text-align: center; }
    .icon-box canvas { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .icon-box span { display: block; margin-top: 8px; font-size: 13px; color: #64748b; }
    button {
      margin-top: 24px; padding: 12px 24px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>JobVault Icon Generator</h1>
  <p>Click the button below to download all three icon sizes.</p>
  <div class="icons" id="icons"></div>
  <br />
  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 48, 128];
    const canvases = {};

    function drawIcon(size) {
      const c = document.createElement('canvas');
      c.width = size;
      c.height = size;
      const ctx = c.getContext('2d');

      const r = size * 0.18;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#2563eb');
      grad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.36}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('JV', size / 2, size / 2 + size * 0.02);

      return c;
    }

    sizes.forEach((size) => {
      const c = drawIcon(size);
      canvases[size] = c;
      const box = document.createElement('div');
      box.className = 'icon-box';
      box.appendChild(c);
      const label = document.createElement('span');
      label.textContent = `${size}×${size}`;
      box.appendChild(label);
      document.getElementById('icons').appendChild(box);
    });

    function downloadAll() {
      sizes.forEach((size) => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvases[size].toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
